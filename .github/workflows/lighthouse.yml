name: Lighthouse CI

on:
  push:
    branches: ["master"]
    paths: ["index.html"]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install http-server & Lighthouse CI
        run: npm install -g @lhci/cli http-server

      - name: Serve site
        run: http-server . -p 8080 &

      - name: Run Lighthouse CI
        run: |
          lhci autorun \
            --collect.url=http://localhost:8080 \
            --collect.numberOfRuns=1 \
            --assert.assertions.categories:performance=["warn",{"minScore":0.8}] \
            --assert.assertions.categories:accessibility=["error",{"minScore":0.9}] \
            --assert.assertions.categories:best-practices=["warn",{"minScore":0.9}] \
            --assert.assertions.categories:seo=["warn",{"minScore":0.9}] \
            --upload.target=temporary-public-storage
